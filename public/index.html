<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edge TTS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>


    <p class="description">
      Hover over text on any webpage. Click the Play icon that appears.
    </p>

    <div class="field">
      <div class="field-header">
        <label>Voice</label>
      </div>
      <select id="voice-select">
        <option value="en-US-AriaNeural">Aria (Female)</option>
        <option value="en-US-GuyNeural">Guy (Male)</option>
        <option value="en-GB-SoniaNeural">Sonia (Female, UK)</option>
        <option value="en-GB-RyanNeural">Ryan (Male, UK)</option>
        <option value="en-AU-NatashaNeural">Natasha (Female, AU)</option>
        <option value="en-AU-WilliamNeural">William (Male, AU)</option>
      </select>
    </div>

    <div class="field">
      <div class="field-header">
        <label>Speed</label>
        <span id="speed-label" class="speed-badge">0%</span>
      </div>
      <input type="range" id="rate-slider" min="-50" max="100" value="0">
    </div>

    <div class="field">
      <div class="field-header">
        <label>Status on this site</label>
      </div>
      <button id="toggle-site-btn" style="width: 100%; padding: 8px; border-radius: 6px; cursor: pointer; border: 1px solid #e2e8f0; background: #f8fafc; font-family: inherit; font-size: 14px; font-weight: 500; transition: all 0.2s;">Loading...</button>
    </div>


  <script src="popup.js"></script>
</body>
</html>
