<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edge TTS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <div class="icon-box">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
    </div>
    <h1 class="title">Edge TTS</h1>
  </div>

  <div class="card">
    <p class="description">
      Hover over text on any webpage. Click the Play icon that appears.
    </p>

    <div class="field">
      <div class="field-header">
        <label>Voice</label>
      </div>
      <select id="voice-select">
        <option value="en-US-AriaNeural">Aria (Female)</option>
        <option value="en-US-GuyNeural">Guy (Male)</option>
        <option value="en-GB-SoniaNeural">Sonia (Female, UK)</option>
        <option value="en-GB-RyanNeural">Ryan (Male, UK)</option>
        <option value="en-AU-NatashaNeural">Natasha (Female, AU)</option>
        <option value="en-AU-WilliamNeural">William (Male, AU)</option>
      </select>
    </div>

    <div class="field" style="margin-top: 16px;">
      <div class="field-header">
        <label>Speed</label>
        <span id="speed-label" class="speed-badge">0%</span>
      </div>
      <input type="range" id="rate-slider" min="-50" max="100" value="0">
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
